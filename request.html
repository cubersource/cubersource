<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Заказать игру | CuberSource</title>
    <style>
        body { background: #0b0b0d; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Контейнер с эффектом стекла */
        .request-box { 
            background: rgba(30, 30, 35, 0.6); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 204, 255, 0.2); 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 { font-size: 24px; color: #fff; margin-bottom: 10px; letter-spacing: 1px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        /* Поля ввода */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #00ccff; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        
        input, textarea { 
            width: 100%; background: rgba(0, 0, 0, 0.3); color: #fff; 
            border: 1px solid #333; padding: 12px; border-radius: 8px; 
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: #00ccff; box-shadow: 0 0 10px rgba(0, 204, 255, 0.2); }

        /* Кнопка отправки */
        .submit-btn { 
            width: 100%; background: #e94560; color: white; padding: 15px; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 16px; margin-top: 10px;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
        }
        .submit-btn:hover { background: #ff2e63; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4); }

        .back-link { display: block; margin-top: 25px; color: #555; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-link:hover { color: #00ccff; }
    </style>
</head>
<body>

<div class="request-box">
    <img src="favicon.png" alt="CS" style="height: 50px; margin-bottom: 20px; filter: drop-shadow(0 0 10px #00ccff);">
    <h1>ЗАКАЗАТЬ ИГРУ</h1>
    <p>Напиши название, и мы постараемся добавить её в наш архив как можно быстрее.</p>

    <div class="input-group">
        <label>Ваше Имя / Ник</label>
        <input type="text" id="userName" placeholder="Напр. Сталкер_777">
    </div>

    <div class="input-group">
        <label>Название игры</label>
        <input type="text" id="gameName" placeholder="Напр. Need for Speed: Most Wanted">
    </div>

    <button class="submit-btn" onclick="sendRequest()">ОТПРАВИТЬ ЗАЯВКУ</button>

    <a href="index.html" class="back-link">← ВЕРНУТЬСЯ НА ГЛАВНУЮ</a>
</div>

<script>
    function sendRequest() {
        const user = document.getElementById('userName').value;
        const game = document.getElementById('gameName').value;

        if (!user || !game) {
            alert("Пожалуйста, заполни все поля!");
            return;
        }

        // Сохраняем заявку в память (локально для админа)
        let orders = JSON.parse(localStorage.getItem('gameRequests')) || [];
        orders.push({
            user: user,
            game: game,
            date: new Date().toLocaleString()
        });
        localStorage.setItem('gameRequests', JSON.stringify(orders));

        alert("Заявка принята! Админ скоро проверит её в панели управления.");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
