<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 30px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #00ccff; margin-bottom: 30px; max-width: 600px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #252525; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: #00ccff; color: black; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #result { margin-top: 20px; background: #000; padding: 15px; border: 1px dashed #555; white-space: pre-wrap; font-family: monospace; color: #27ae60; display: none; }
        .req-box { border-color: #27ae60; }
        .req-item { border-bottom: 1px solid #333; padding: 8px 0; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Панель управления</h1>

    <!-- БЛОК 1: ГЕНЕРАТОР КАРТОЧЕК -->
    <div class="box">
        <h3>Генератор кода для игр</h3>
        <input type="text" id="gName" placeholder="Название игры">
        <input type="text" id="gImg" placeholder="Ссылка на картинку">
        <input type="text" id="gLink" placeholder="Файл страницы (например: gta.html)">
        <button onclick="generate()">СОЗДАТЬ КОД</button>
        <div id="result"></div>
    </div>

    <!-- БЛОК 2: СПИСОК ЗАЯВОК -->
    <div class="box req-box">
        <h3>📋 Заявки от игроков</h3>
        <div id="requestList">Загрузка...</div>
        <button onclick="showRequests()" style="background:#27ae60; color:white;">ОБНОВИТЬ</button>
        <button onclick="clearReq()" style="background:#e94560; color:white;">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <script>
        // Код генератора
        function generate() {
            let name = document.getElementById('gName').value;
            let img = document.getElementById('gImg').value;
            let link = document.getElementById('gLink').value;
            let code = `<!-- Карта -->\n<a href="${link}" class="post-card">\n    <img src="${img}">\n    <div class="info"><h3>${name}</h3></div>\n</a>`;
            document.getElementById('result').innerText = code;
            document.getElementById('result').style.display = "block";
        }

        // Код работы с заявками
        function showRequests() {
            let requests = JSON.parse(localStorage.getItem('gameRequests') || "[]");
            let listDiv = document.getElementById('requestList');
            if (requests.length === 0) {
                listDiv.innerHTML = "Заявок пока нет.";
            } else {
                listDiv.innerHTML = requests.map(r => `<div class="req-item"><span style="color:#888;">[${r.date}]</span> <b style="color:#27ae60;">${r.name}</b></div>`).reverse().join('');
            }
        }

        function clearReq() {
            if(confirm("Удалить всё?")) {
                localStorage.removeItem('gameRequests');
                showRequests();
            }
        }

        // Показываем при входе
        showRequests();
    </script>
</body>
</html>
