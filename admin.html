<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ЗАМОК БЕЗОПАСНОСТИ -->
    <script>
        if (sessionStorage.getItem('admin_access') !== 'true') {
            window.location.href = "index.html";
        }
    </script>
    <link rel="icon" type="image/png" href="favicon.png">
    <title>TERMINAL | CuberSource Control</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; border: 1px solid #00ffcc; padding: 30px; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        h1, h2 { text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px; color: #fff; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #0a0a0a; padding: 20px; border: 1px solid #1a1a1a; text-align: center; border-radius: 5px; }
        .stat-card span { display: block; font-size: 30px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .panel-section { background: #0a0a0a; padding: 25px; border-radius: 5px; margin-bottom: 30px; border: 1px solid #1a1a1a; }
        .order-row { background: #000; padding: 15px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .order-row:hover { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.1); }
        button { background: #00ffcc; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; font-family: inherit; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        .btn-danger { background: #ff2e63; color: #fff; margin-top: 10px; }
        input, textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #1a1a1a; padding: 12px; box-sizing: border-box; font-family: inherit; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #00ffcc; }
        .back-btn { color: #555; text-decoration: none; font-size: 12px; transition: 0.3s; cursor: pointer; }
        .back-btn:hover { color: #00ffcc; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; }
    </style>
</head>
<body>

<div class="admin-container">
    <div onclick="logout()" class="back-btn">[ ВЫЙТИ И ЗАБЛОКИРОВАТЬ ]</div>
    <h1 style="display: flex; align-items: center; gap: 15px;">
        <img src="favicon.png" alt="CS" style="height: 40px; filter: drop-shadow(0 0 5px #00ffcc);"> 
        CORE CONTROL PANEL v2.0
    </h1>

    <div class="stat-grid">
        <div class="stat-card">ACTIVE REQUESTS <span id="countOrders">0</span></div>
        <div class="stat-card">SYSTEM STATUS <span style="color: #0f0;">STABLE</span></div>
        <div class="stat-card">UPLOADS <span style="color: #ff9900;">IN PROGRESS</span></div>
    </div>

    <div class="panel-section">
        <h2>INCOMING REQUESTS [ЗАЯВКИ]</h2>
        <div id="ordersList"></div>
        <button class="btn-danger" onclick="clearOrders()">WIPE ALL DATA [ОЧИСТИТЬ]</button>
    </div>

    <div class="panel-section">
        <h2>CARD GENERATOR [ГЕНЕРАТОР]</h2>
        <p style="font-size: 12px; color: #444; margin-bottom: 20px;">Генерация HTML-кода для новых игровых карточек</p>
        <div style="display: flex; gap: 15px;">
            <input type="text" id="gameTitle" placeholder="TITLE (Название)">
            <input type="text" id="gameImg" placeholder="IMAGE FILE (Напр. p2.jpg)">
        </div>
        <input type="text" id="gameTag" placeholder="TAGS (Напр. Экшен / Valve)">
        <button onclick="generateCard()">GENERATE CODE</button>
        <textarea id="resultCode" readonly style="margin-top: 20px; height: 120px;" placeholder="Код появится здесь..."></textarea>
        <button onclick="copyCode()" style="background: #fff; color: #000; width: 100%;">COPY TO CLIPBOARD</button>
    </div>
</div>

<script>
    function logout() {
        sessionStorage.removeItem('admin_access');
        window.location.href = "index.html";
    }

    function loadOrders() {
        let orders = JSON.parse(localStorage.getItem('gameRequests')) || [];
        const list = document.getElementById('ordersList');
        document.getElementById('countOrders').innerText = orders.length;
        list.innerHTML = orders.length === 0 ? '<p style="color: #222;">NO ACTIVE REQUESTS FOUND...</p>' : '';
        orders.forEach((order) => {
            list.innerHTML += `<div class="order-row"><div><span style="color: #00ffcc;">></span> <strong>${order.game}</strong><div style="font-size: 11px; color: #444;">USER: ${order.user} | DATE: ${order.date}</div></div><div style="color: #0f0; font-size: 12px;">[NEW]</div></div>`;
        });
    }

    function clearOrders() {
        if (confirm("ВНИМАНИЕ: Все данные будут стерты. Подтвердить?")) {
            localStorage.removeItem('gameRequests');
            loadOrders();
        }
    }

    function generateCard() {
        const title = document.getElementById('gameTitle').value;
        const img = document.getElementById('gameImg').value;
        const tag = document.getElementById('gameTag').value || "Игры / Новинка";
        const link = title.toLowerCase().replace(/ /g, "-") + ".html";
        document.getElementById('resultCode').value = `<a href="${link}" class="post-card">\n    <img src="${img}" alt="${title}">\n    <div class="info">\n        <span class="tag">${tag}</span>\n        <h3>${title}</h3>\n    </div>\n</a>`;
    }

    function copyCode() {
        const text = document.getElementById('resultCode');
        if(!text.value) return;
        text.select();
        document.execCommand("copy");
        alert("SYSTEM: Код скопирован.");
    }
    loadOrders();
</script>
</body>
</html>
